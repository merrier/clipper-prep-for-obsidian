<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=440, initial-scale=1" />
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1e2528;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 440px;
        height: 280px;
        margin: 0;
        overflow: hidden;
        background: #f6faf5;
      }

      .tile {
        position: relative;
        width: 440px;
        height: 280px;
        padding: 28px;
        background:
          linear-gradient(132deg, rgba(31, 111, 74, 0.16), transparent 56%),
          linear-gradient(315deg, rgba(240, 200, 90, 0.28), transparent 50%),
          #f6faf5;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .mark {
        width: 52px;
        height: 52px;
        border-radius: 15px;
        display: block;
        box-shadow: 0 10px 22px rgba(74, 40, 120, 0.22);
      }

      .name {
        display: grid;
        gap: 2px;
      }

      .name strong {
        color: #151a1d;
        font-size: 20px;
        line-height: 1.1;
      }

      .name span {
        color: #667085;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        width: 292px;
        margin: 30px 0 0;
        color: #151a1d;
        font-size: 34px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        width: 176px;
        margin: 14px 0 0;
        color: #47545b;
        font-size: 15px;
        line-height: 1.38;
        font-weight: 650;
      }

      .code-card {
        position: absolute;
        right: 24px;
        bottom: 24px;
        width: 206px;
        height: 94px;
        border: 1px solid #c9d9cf;
        border-radius: 10px;
        padding: 13px;
        background: #ffffff;
        box-shadow: 0 14px 32px rgba(31, 43, 38, 0.16);
      }

      .code {
        color: #1e2528;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.55;
      }

      .link {
        color: #1f6f4a;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main class="tile">
      <div class="brand">
        <img class="mark" src="icon-128.svg" alt="" />
        <div class="name">
          <strong>Clipper Extended</strong>
          <span>Obsidian helper</span>
        </div>
      </div>

      <h1>Cleaner web clips</h1>
      <p>Prepare pages before Obsidian Web Clipper captures them.</p>

      <div class="code-card">
        <div class="code">Read <span class="link">[links]</span><br />Keep images<br />Mirror docs</div>
      </div>
    </main>
  </body>
</html>
